syntax = "proto3";

package wendy.agent.services.v1;

import "wendy/agent/services/v1/shared.proto";

service WendyContainerService {
    rpc ListLayers(ListLayersRequest) returns (stream LayerHeader);
    rpc WriteLayer(stream WriteLayerRequest) returns (stream WriteLayerResponse);
    rpc CreateContainer(CreateContainerRequest) returns (CreateContainerResponse);
    rpc CreateContainerWithProgress(CreateContainerRequest) returns (stream CreateContainerProgressResponse);
    rpc RunContainer(RunContainerLayersRequest) returns (stream RunContainerLayersResponse);
    rpc StartContainer(StartContainerRequest) returns (stream RunContainerLayersResponse);
    rpc AttachContainer(stream AttachContainerRequest) returns (stream RunContainerLayersResponse);
    rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);
    rpc DeleteContainer(DeleteContainerRequest) returns (DeleteContainerResponse);
    rpc ListContainers(ListContainersRequest) returns (stream ListContainersResponse);
    rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
    rpc RemoveVolume(RemoveVolumeRequest) returns (RemoveVolumeResponse);
    rpc ListContainerStats(ListContainerStatsRequest) returns (ListContainerStatsResponse);
    rpc GetResourceStats(GetResourceStatsRequest) returns (GetResourceStatsResponse);
    rpc GetContainerPorts(GetContainerPortsRequest) returns (GetContainerPortsResponse);
    rpc StreamMCP(stream MCPChunk) returns (stream MCPChunk);
    rpc QueryChunks(QueryChunksRequest) returns (QueryChunksResponse);
    rpc WriteChunks(stream WriteChunksRequest) returns (WriteChunksResponse);
    // QueryLayers reports which uncompressed layers (by diff ID) the device
    // already has in its content store, with their sizes. The CLI uses this to
    // skip decompressing and content-chunking layers the device can reuse as-is
    // — for those layers no dedup is possible, so chunking would be pure waste.
    rpc QueryLayers(QueryLayersRequest) returns (QueryLayersResponse);
}

message ListContainersRequest {}

message ListContainersResponse {
    AppContainer container = 1;
}

message ListLayersRequest {}

message WriteLayerRequest {
    string digest = 1;

    bytes data = 2;
}

message WriteLayerResponse {}

message QueryChunksRequest {
    // Candidate chunk hashes (raw 32-byte sha256 digests).
    repeated bytes chunk_hashes = 1;
}

message QueryChunksResponse {
    // Subset of the requested hashes that the device does NOT have.
    repeated bytes missing_hashes = 1;
}

message WriteChunksRequest {
    bytes hash = 1;   // raw 32-byte sha256 of data
    bytes data = 2;
}

message WriteChunksResponse {}

message QueryLayersRequest {
    // Uncompressed layer digests (diff IDs, "sha256:<hex>") to check for
    // presence in the device's content store.
    repeated string diff_ids = 1;
}

message QueryLayersResponse {
    // The subset of the requested layers the device already has. Layers absent
    // from this list are not present and must be pushed.
    repeated PresentLayer present = 1;
}

message PresentLayer {
    // The uncompressed layer digest (diff ID) that the device has.
    string diff_id = 1;
    // Uncompressed blob size as stored in the content store. The CLI puts this
    // in the reassembly header so AssembleImage references the layer correctly
    // without the CLI having to decompress it to learn its size.
    int64 size = 2;
}

message LayerHeader {
    // The hash identity of the layer.
    string digest = 1;

    int64 size = 2;
}

message RunContainerLayersRequest {
    // Unique name for the container image
    string image_name = 1;

    string app_name = 2;

    // The command to run when the container starts.
    string cmd = 3;

    // The layers that will be uploaded to the agent.
    repeated RunContainerLayerHeader layers = 4;

    /// The `wendy.json` file as found in the project
    bytes app_config = 5;

    // Optional restart policy override for Docker runtime.
    optional RestartPolicy restart_policy = 6;

    string working_dir = 7;

    // User-provided runtime arguments to append to the container entrypoint.
    repeated string user_args = 8;

    // OCI image config JSON (the config blob produced by the image builder),
    // carrying Cmd/Entrypoint/Env/WorkingDir/User. Required by the chunk-diff
    // path so the assembled image preserves the original runtime config; when
    // empty the agent synthesises a minimal config (legacy behaviour).
    bytes image_config = 9;
}

message CreateContainerRequest {
    string image_name = 1;
    string app_name = 2;
    string cmd = 3;
    bytes app_config = 4;
    string working_dir = 5;
    optional RestartPolicy restart_policy = 6;
    repeated string user_args = 7;
    // Additional environment variables to inject. Format: "KEY=VALUE".
    // Applied after the image's built-in env and before Wendy system env vars,
    // so Wendy vars always win.
    repeated string env = 8;
}

message CreateContainerResponse {}

message CreateContainerProgress {
    enum Phase {
        PHASE_UNSPECIFIED = 0;
        UNPACKING = 1;
        APPLYING_LAYER = 2;
        CREATING_CONTAINER = 3;
        COMPLETE = 4;
    }

    Phase phase = 1;
    int32 layer_index = 2;
    int32 total_layers = 3;
    int64 layer_size = 4;
    bool reused_snapshot = 5;
}

message CreateContainerProgressResponse {
    oneof response_type {
        CreateContainerProgress progress = 1;
        CreateContainerResponse completed = 2;
    }
}

message StartContainerRequest {
    string app_name = 1;

    // Optional restart policy override. When unset the agent uses its default.
    optional RestartPolicy restart_policy = 2;
}

// AttachContainerRequest is the client-to-server message for AttachContainer.
// The first message must set app_name; subsequent messages carry stdin data.
message AttachContainerRequest {
    oneof request_type {
        string app_name = 1;
        bytes stdin_data = 2;
    }
}

message RunContainerLayerHeader {
    // The hash identity of the layer.
    string digest = 1;

    int64 size = 2;

    string diff_id = 3;

    // Whether the layer is compressed with gzip.
    // Deprecated: use compression instead. Kept for backward compatibility with
    // older CLIs that do not send the compression field.
    bool gzip = 4;

    // Compression format of the layer blob. When set to a non-zero value,
    // takes precedence over the gzip field.
    CompressionType compression = 5;

    enum CompressionType {
        COMPRESSION_GZIP = 0;  // default; treated as gzip when gzip=true, uncompressed when gzip=false
        COMPRESSION_ZSTD = 1;
        COMPRESSION_NONE = 2;
    }

    // Ordered list of chunk hashes (raw 32-byte sha256) that, concatenated in
    // order, reconstruct the uncompressed layer tar. When set, the agent
    // reassembles the layer from chunks instead of receiving inline bytes.
    repeated bytes chunk_hashes = 9;
}

message RunContainerLayersResponse {
    oneof response_type {
        Started started = 1;
        ConsoleOutput stdout_output = 2;
        ConsoleOutput stderr_output = 3;
    }

    message Started {}

    message ConsoleOutput {
        bytes data = 1;
    }
}

message StopContainerRequest {
    string app_name = 1;
}

message StopContainerResponse {}

message DeleteContainerRequest {
    string app_name = 1;

    // Optionally delete the container image as well (useful for freeing space)
    bool delete_image = 2;

    // Optionally delete persistent volumes at /var/lib/wendy/volumes/
    bool delete_volumes = 3;
}

message DeleteContainerResponse {}

// --- Volume management ---

message ListVolumesRequest {}

message VolumeInfo {
    string name = 1;
    string path = 2;
    int64 size_bytes = 3;
    // RFC 3339 UTC (directory mtime — may update when files are added/removed)
    string created_at = 4;
    repeated string used_by = 5;
}

message ListVolumesResponse {
    repeated VolumeInfo volumes = 1;
}

message RemoveVolumeRequest {
    string name = 1;
}

message RemoveVolumeResponse {}

// --- Container stats ---

message ContainerStats {
    string app_name = 1;
    int64 memory_bytes = 2;   // current cgroup memory usage
    int64 storage_bytes = 3;  // container image content size only (excludes writable layer/snapshot usage)
}

message ListContainerStatsRequest {}

message ListContainerStatsResponse {
    repeated ContainerStats stats = 1;
}

// --- Resource stats (host + per-container, for `wendy device top`) ---

message GetResourceStatsRequest {}

message GetResourceStatsResponse {
    HostStats host = 1;
    repeated ResourceContainerStats containers = 2;
}

// HostStats carries cumulative host counters; the client computes percentages
// from deltas between consecutive samples.
message HostStats {
    uint64 cpu_total_jiffies = 1;    // sum of all fields on the /proc/stat "cpu" line
    uint64 cpu_idle_jiffies = 2;     // idle + iowait fields
    uint32 cpu_count = 3;            // online logical CPUs
    int64 mem_total_bytes = 4;
    int64 mem_available_bytes = 5;
    repeated GpuStats gpus = 6;      // empty when no GPU / no sampler tool present
}

message GpuStats {
    uint32 index = 1;
    string name = 2;
    double util_percent = 3;         // instantaneous utilization as reported by the sampler
    int64 mem_used_bytes = 4;
    int64 mem_total_bytes = 5;
    optional double temp_c = 6;
    optional double power_w = 7;
}

// ResourceContainerStats mirrors ContainerStats keying: app_name is the
// containerd container ID (appID, or appID_serviceName for multi-service apps).
message ResourceContainerStats {
    string app_name = 1;
    uint64 cpu_usage_nanos = 2;      // cumulative user+sys CPU nanoseconds
    int64 memory_bytes = 3;          // current cgroup memory usage
}

// --- Container open ports (listening/bound sockets, for `wendy device top`) ---

message GetContainerPortsRequest {
    string app_name = 1;
}

message GetContainerPortsResponse {
    repeated PortEntry ports = 1;
}

message PortEntry {
    string protocol = 1;   // "tcp", "tcp6", "udp", "udp6"
    uint32 port = 2;       // local port the socket is bound to
    string address = 3;    // local bind address (e.g. "0.0.0.0", "::", "127.0.0.1")
}

message MCPChunk {
    bytes data = 1;
}
